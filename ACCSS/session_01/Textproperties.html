    <!-- Text Properties in CSS are used to control the appearance of text on a webpage.
    Some common text properties include:
    - font-family: Sets the font family for an element.
    - font-size: Sets the size of the font.
    - font-weight: Sets the weight of the font (normal, bold, etc.).
    - color: Sets the color of the text.
    - text-align: Sets the horizontal alignment of the text (left, right, center, justify).
    - text-decoration: Sets the decoration of the text (underline, overline, line-through).
    - text-transform: Controls the capitalization of text (uppercase, lowercase, capitalize).
    - letter-spacing: Sets the spacing between characters.
    - font-weight can also be set to numeric values (100, 200, 300, etc.) to specify the weight of the font more precisely.
    - line-height: Sets the height of a line of text, which can affect the spacing between lines.
    - letter-spacing: Sets the spacing between characters in a text.
    - font-style: Sets the style of the font (normal, italic, oblique).
    - font-variant: Controls the use of small-caps font.
    - font-size can be set using various units such as pixels (px), em, rem, percentages (%), etc. -->

    <!--
    text-align: left; /* Aligns text to the left */
    text-align: start; /* Aligns text to the start of the container */
    text-align: right; /* Aligns text to the right */
    text-align: end; /* Aligns text to the end of the container */
    text-align: center; /* Aligns text to the center */
    text-align: justify; /* Justifies text */ -->

    <!-- its related to parent element and the direction of the text.
    For example, in a left-to-right (LTR) context,
    "start" would align text to the left, while in a right-to-left (RTL) context,
    "start" would align text to the right. Similarly,
    "end" would align text to the right in LTR and to the left in RTL contexts.
    This allows for more flexible and context-aware text alignment in web design. -->

    <!-- Font-size units in CSS
    Font-size can be set using various units in CSS, including:
    Absolute units: px (pixels), pt (points), pc(), cm (centimeters), mm (millimeters), in (inches)
    Relative units: em (relative to the font size of the element),
    rem (relative to the font size of the root element),
    % (percentage relative to the parent element's font size),
    vw (viewport width), vh (viewport height),
    vmin (the smaller of viewport width and height),
    vmax (the larger of viewport width and height)

    96px = 1in (1 inch is equal to 96 pixels)
    most commonly used units for font-size are px, em, rem, and %.
    Absolute units like px provide a fixed size,
    while relative units like em and rem allow for more flexible and scalable designs.
    The choice of unit depends on the specific design requirements and the desired responsiveness of the text on
    different devices.

    Not suitable fo responsive design as it does not scale with the user's settings or the size of the viewport. -->

    <!-- It specifies a prioritized list of font family names and/or generic family names for the selected element. 
    The browser will use the first available font in the list. 
    If the specified font is not available, it will fall back to the next font in the list,
    and so on, until it finds a font that is available on the user's system.
    If none of the specified fonts are available, it will use a default font.
    This allows for better control over the appearance of text across different devices and platforms. -->
