<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox in CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
    What is Flexbox?
    Flexibale Box Layout
    It is a one-dimensional layout method for arranging items in rows or colums.
    It helps us to create responsive website

    1. The Flex Model
    main axis horizontal
    cross axis verical, when direction = row

    main axis verical
    cross axis horizontal, when direction = column

    Flexbox Direction - It sets how flex items are placed in the flex container, along which axis and direction.

    flex-direction: row; main axis, left to right

    flexbox-direction: row-reverse; main axis, right to left

    flexbox-direction: column; main axis, top to bottom

    flexbox-direction: column-reverse; main axis, bottom to top


    2. Justify Content - Tells how the browser distributes space between and around content items along the main-axis. 
    justify-content: flex-start;

    justify-content: flex-end;

    justify-content: center;

    justify-content: space-between; It distribute the space only between the content

    justify-content: space-around; It distributes the space in between & give space two side of the container half space. 

    justify-content: space-evenly;  It distributes space between the content evenly also two sides of the content container. 


    3. Flex Wrap - Sets whether flex items are forced onto one line or can wrap onto multiple lines.

    flex-wrap: nowrap;

    flex-wrap: wrap;

    flex-wrap: wrap-reverse;



    4. Align Items - Distributes our items along the cross axis.

    align-items: flex-start;

    align-items: flex-end;

    align-items: center;

    align-items: baseline;



   5. Align Content - Its sets the distribution of space between and around content items along a flexbox's cross-axis.

    align-content: flex-start/ flex-end/ center;

    align-content: space-between/ space-around/ evenly;

    align-content: baseline;


    6. Align Self - Aligns an item along the cross axis(It will work on individual item & also overwrite ohter property)

    align-self: flex-start;

    align-self: flex-end;

    align-self: center;

    align-self: baseline;


    7. Flex Sizing

    flex-basis - It sets the initial main size of a flex item.

    flex-basis: 100px;

    flex-grow - It specifies hwo much of the flex container's remaining space should be assigned to the flex items's main size.

    flex-grow: 1;

    flex Sizing - It sets the flex shrink factor of a flex item.

    flex-shrink: 1;

    

    8. Flex Shorthand
    
    flex-grow | flex-shrink |flex-basis
    flex: 2 2 100px;

    flex-grow | flex-basis

    flex: 2 100px;

    flex-grow(unitless)
    flex: 2;

    flex-basis
    flex: 100px;



    -->
    <h1>Flexbox Playground</h1>
    <div id="container">
        <div style="background-color: #9400d3;">violet</div>
        <div style="background-color: #4b0082;">indigo</div>
        <div style="background-color: #0000ff;">blue</div>
        <div style="background-color: #00ff00;">green</div>
        <div style="background-color: #fff000;">yellow</div>
        <div style="background-color: #ff7f00;">orange</div>
        <div style="background-color: #ff0000;">red</div>
    </div>


</body>
</html>
