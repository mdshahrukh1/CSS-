<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Properties</title>
    <link rel="stylesheet" href="Transformcss.css">
</head>

<body>
    <!--
    1. CSS Transform - This property lets you rotate, scale, skew, or translate an element.

    (i) Rotate
    transform: rotate(45deg);

    (ii) Scale
    transform: scale(0.5);
    transfrom: scale(1.5);

    (iii) Translate
    transform: translate(50px, 50px);
    transfrom: translateX(10px);
    transfrom: translateY(10px);

    (iv) Skew
    transform: skew(30deg);


    2.Box Shadow - It adds shadow effects around an element's frame
    box-shadow: 2px 2px 10px green;
    box-shadow: Xoffset Yoffset blur-radius shadow-color;
             
    3. Background Image - Lets you set an image as a background.

    background-image: url("link to photo");
    background-size:contain - repeat / cover - crop/ auto - stretch;
 
    -->
    <section>
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
        <div id="five">5</div>

    </section>

    <div id="box">
        Tanjiro
    </div>
</body>

</html>
