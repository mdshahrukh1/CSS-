<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation in CSS</title>
    <link rel="stylesheet" href="animation.css">
</head>

<body>
    <!-- 
    1. CSS Animations - To animate CSS elements
    
    @keyframe myName {

    from{front-size: 20px}

    to {font-size: 40px}

    }  this is a blue print of animation


    CSS Animations
    
    animation-name
    animation-duration
    animation-timing-function
    animation-delay
    animation-iteration-count
    animation-direction

    Animation Shorthand
    animation: myName 2s linear 3s infinite normal;

    % in Animation

    @keyframe MyName {

    0% {font-size: 20px;}
    50% {font-size: 30px;}
    100%{font-size: 40px}

    }


    2. Media Queries - It Helps to create a responsive website

    media feature -width (of viewport)

    @media(width: 400px){
    div {
    background-color: red;
      }
    }

    @media(min-width: 400px){
    div {
    background-color: red;
      }
    }

    @media(max-width: 400px){
    div {
    background-color: red;
      }
    }

    @media(min-width: 200px) and (max-width: 300px) {
    div {
        background-color: red;
      }
    }

    @media(orientation: landscape){
    div {
        background-color: red;
      }
    }

    z-index - It decides the stack level of elements
    Overlapping elements with a larger z-index cover those with a smaller one.

    we have give postions to apply z-index, it will not work on default/static potion.
    
    z-index: auto(0)

    z-index: 1 / 2/ 3...

    z-index: -1/ -2/ ...

    -->

    <h1>Animation</h1>
    <div class="box">This is a box</div>

</body>

</html>
