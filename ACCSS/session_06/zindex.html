<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z index in CSS</title>
    <link rel="stylesheet" href="zindex.css">
</head>
<body>
    <!-- 
    z-index - It decides the stack level of elements
    Overlapping elements with a larger z-index cover those with a smaller one.

    we have give postions to apply z-index, it will not work on default/static potion.
    
    z-index: auto(0)

    z-index: 1 / 2/ 3...

    z-index: -1/ -2/ ... 

    -->

    <h1>Z-Index</h1>
    <div class="box one">1</div>
    <div class="box two">2</div>
    <div class="box three">3</div>

</body>
</html>
